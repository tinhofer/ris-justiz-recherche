name: RIS query (raw debug)

# Diagnose-Workflow: führt eine Live-Anfrage gegen die OGD-API aus und
# dumpt die unveränderte JSON-Antwort in das Step-Summary. Gedacht zur
# einmaligen Verwendung beim Auffinden API-Response-Pfade — danach
# wieder löschen.

on:
  workflow_dispatch:
    inputs:
      applikation:
        description: 'Gericht / Behörde'
        required: true
        default: Justiz
        type: choice
        options:
          - Justiz
          - Vfgh
          - Vwgh
          - Bvwg
          - Lvwg
          - Dsk
          - AsylGH
          - Normenliste
          - Pvak
          - Gbk
          - Dok
      suchworte:
        description: 'Suchworte'
        required: false
        type: string
      geschaeftszahl:
        description: 'Geschäftszahl'
        required: false
        type: string
      norm:
        description: 'Norm (kanonisch "{Kürzel} §{Paragraph}")'
        required: false
        type: string
      pro_seite:
        description: 'Treffer pro Seite'
        required: true
        default: Ten
        type: choice
        options:
          - Ten
          - Twenty
          - Fifty
          - OneHundred

concurrency:
  group: ris-query-raw-${{ github.actor }}
  cancel-in-progress: false

jobs:
  raw:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    defaults:
      run:
        working-directory: recherche-ris-rechtsprechung/skill-draft/ris-rechtsprechung
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: RIS-Anfrage (raw)
        env:
          APPLIKATION: ${{ inputs.applikation }}
          SUCHWORTE: ${{ inputs.suchworte }}
          GESCHAEFTSZAHL: ${{ inputs.geschaeftszahl }}
          NORM: ${{ inputs.norm }}
          PRO_SEITE: ${{ inputs.pro_seite }}
        run: |
          args=(--applikation "$APPLIKATION" --pro-seite "$PRO_SEITE" --raw)
          if [ -n "$SUCHWORTE" ]; then args+=(--suchworte "$SUCHWORTE"); fi
          if [ -n "$GESCHAEFTSZAHL" ]; then args+=(--geschaeftszahl "$GESCHAEFTSZAHL"); fi
          if [ -n "$NORM" ]; then args+=(--norm "$NORM"); fi

          {
            echo "## RIS-Recherche (raw JSON)"
            echo
            echo "**Anfrage:** \`$APPLIKATION\`"
            [ -n "$SUCHWORTE" ]      && echo "- Suchworte: \`$SUCHWORTE\`"
            [ -n "$GESCHAEFTSZAHL" ] && echo "- Geschäftszahl: \`$GESCHAEFTSZAHL\`"
            [ -n "$NORM" ]           && echo "- Norm: \`$NORM\`"
            echo "- \`$PRO_SEITE\` Treffer/Seite"
            echo
            echo '```json'
          } >> "$GITHUB_STEP_SUMMARY"

          python scripts/ris_search.py "${args[@]}" >> "$GITHUB_STEP_SUMMARY"

          echo '```' >> "$GITHUB_STEP_SUMMARY"
