name: RIS smoke test

on:
  workflow_dispatch:
  schedule:
    # Sonntag 03:00 UTC = 04:00 MEZ / 05:00 MESZ.
    # RIS empfiehlt Massenabfragen außerhalb 06–18 Uhr oder am Wochenende.
    - cron: '0 3 * * 0'

concurrency:
  group: ris-smoke-test
  cancel-in-progress: false

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    defaults:
      run:
        working-directory: recherche-ris-rechtsprechung/skill-draft/ris-rechtsprechung
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run unit + live smoke tests
        run: python -m unittest tests.test_ris_search -v
